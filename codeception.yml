actor: Tester
paths:
  tests: tests
  output: tests/_output
  log: tests/_output
  data: tests/_data
  support: tests/_support
  envs: tests/_envs
bootstrap: _bootstrap.php
settings:
  colors: true
coverage:
  enabled: true
  include:
    - src/*
  exclude:
    - src/migrations/*
    - src/templates/*
    - src/translations/*
    - src/web/assets/*
    - vendor/*
params:
  - tests/.env
  - env
modules:
  config:
    \craft\test\Craft:
      configFile: 'tests/_craft/config/test.php'
      entryUrl: 'https://test.craftcms.test/index.php'
      projectConfig: { }
      migrations: [ ]
      plugins:
        lens:
          class: '\vitordiniz22\craftlens\Plugin'
          handle: lens
      cleanup: true
      transaction: true
      dbSetup: { clean: true, setupCraft: true }
      fullMock: false
